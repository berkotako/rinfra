# RInfra — DigitalOcean droplet stack (production, single origin).
#
# Postgres (durable data) → migrate (one-shot schema) → app (all-in-one image:
# Go API + web console on one origin, :8080) → Caddy (TLS terminator / reverse
# proxy on :80 + :443). The console and API share an origin, so there is no CORS
# wiring: the browser hits https://<your-host>/ for the console and
# https://<your-host>/api/v1/... for the API, both proxied to `app`.
#
# Driven by deploy/digitalocean/install.sh — run that on a fresh droplet rather
# than invoking compose by hand. Values come from the sibling .env (generated by
# the installer; never committed).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rinfra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: rinfra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rinfra"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # One-shot: applies golang-migrate migrations against Postgres, then exits.
  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://rinfra:${POSTGRES_PASSWORD}@postgres:5432/rinfra?sslmode=disable",
        "up",
      ]
    restart: "no"

  # All-in-one control plane: Go API + web console on the same origin (:8080).
  app:
    build:
      context: ../..
      dockerfile: Dockerfile.allinone
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      RINFRA_ADDR: ":8080"
      DATABASE_URL: postgres://rinfra:${POSTGRES_PASSWORD}@postgres:5432/rinfra?sslmode=disable
      RINFRA_MASTER_KEY: ${RINFRA_MASTER_KEY:?set RINFRA_MASTER_KEY in .env}
      # Bootstrap admin: the binary seeds NO admin unless this is set (it never
      # defaults to admin/admin in production). Change the password after first login.
      RINFRA_ADMIN_PASSWORD: ${RINFRA_ADMIN_PASSWORD:?set RINFRA_ADMIN_PASSWORD in .env}
      # Required before any live deploy/teardown (Pulumi local state). Live cloud
      # provisioning ALSO needs the Pulumi CLI on PATH inside the image — see the
      # README; the platform (engagements/audit/emulation/console) runs without it.
      PULUMI_CONFIG_PASSPHRASE: ${PULUMI_CONFIG_PASSPHRASE:-rinfra-local}
      RINFRA_THREATFEED: ${RINFRA_THREATFEED:-bundled}
    # RINFRA_WEB_DIR=/srv/web is baked into the image (it serves the console).
    # Not published to the host: Caddy is the only public entrypoint.
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # TLS terminator + reverse proxy. With RINFRA_SITE_ADDRESS set to a domain,
  # Caddy obtains and renews a Let's Encrypt cert automatically (ports 80+443).
  # Left at the default ":80" (no domain), it serves plain HTTP on port 80.
  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    environment:
      RINFRA_SITE_ADDRESS: ${RINFRA_SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
