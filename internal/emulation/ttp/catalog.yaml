      registry_key:
        from: registry_key
        default: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Run'
      registry_value:
        from: registry_value
        default: RInfraTest

  # Read-only discovery primitives (safe Windows built-ins; no args). Available
  # on every framework with a shell — see c2.DiscoveryCommand.
  - attack_id: "T1018"
    name: "Remote System Discovery"
    tactic: discovery
