# Portable technique → primitive catalog.
#
# This is the data-driven "add a TTP" surface. Each entry maps an ATT&CK
# technique to one portable c2.Primitive plus argument bindings; every C2
# framework knows how to render the (small, closed) set of primitives, so a
# technique added here is automatically available on every framework that
# supports its primitive — with NO Go changes. A framework that doesn't support
# the primitive reports the technique unsupported (honest BAS taxonomy).
#
# Schema per entry:
#   attack_id: "T1059.001"        # ATT&CK technique ID (dispatch key; required)
#   name:      "..."              # human-readable (optional, documentation)
#   tactic:    execution          # ATT&CK tactic slug (optional, documentation)
#   primitive: powershell         # one of the c2.PrimitiveKind values (required)
#   args:                         # optional; resolved into Primitive.Args
#     <arg_name>:
#       from:     <input_key>     # source key in technique.Inputs (optional)
#       default:  <value>         # used when the input is absent/empty (optional)
#       required: true            # error if unresolved (optional, default false)
#
# No payload content, shellcode, or exploit material belongs in this file — only
# the portable verb + the parameters the technique supplies.
techniques:
  - attack_id: "T1059.001"
    name: "Command and Scripting Interpreter: PowerShell"
    tactic: execution
    primitive: powershell
    args:
      script:
        from: command
        default: whoami

  - attack_id: "T1059.003"
    name: "Command and Scripting Interpreter: Windows Command Shell"
    tactic: execution
    primitive: shell
    args:
      command:
        from: command
        default: whoami

  - attack_id: "T1082"
    name: "System Information Discovery"
    tactic: discovery
    primitive: sysinfo

  - attack_id: "T1057"
    name: "Process Discovery"
    tactic: discovery
    primitive: process_list

  - attack_id: "T1049"
    name: "System Network Connections Discovery"
    tactic: discovery
    primitive: net_connections

  - attack_id: "T1016"
    name: "System Network Configuration Discovery"
    tactic: discovery
    primitive: net_config

  - attack_id: "T1083"
    name: "File and Directory Discovery"
    tactic: discovery
    primitive: file_list
    args:
      # No default here: the listing root is framework-specific (e.g. "." on
      # Sliver/Havoc/PoshC2, "C:\" on Metasploit), so each renderer supplies its
      # own fallback when no path input is given.
      path:
        from: path

  - attack_id: "T1005"
    name: "Data from Local System"
    tactic: collection
    primitive: download
    args:
      path:
        from: path
        required: true

  - attack_id: "T1053.005"
    name: "Scheduled Task/Job: Scheduled Task"
    tactic: persistence
    primitive: scheduled_task
    args:
      task_name:
        from: task_name
        default: RInfraTest

  - attack_id: "T1547.001"
    name: "Boot or Logon Autostart Execution: Registry Run Keys"
    tactic: persistence
    primitive: registry_run_key
    args:
      registry_key:
        from: registry_key
        default: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Run'
      registry_value:
        from: registry_value
        default: RInfraTest

  # Read-only discovery primitives (safe Windows built-ins; no args). Available
  # on every framework with a shell — see c2.DiscoveryCommand.
  - attack_id: "T1018"
    name: "Remote System Discovery"
    tactic: discovery
    primitive: remote_system_discovery

  - attack_id: "T1087.001"
    name: "Account Discovery: Local Account"
    tactic: discovery
    primitive: account_discovery

  - attack_id: "T1069.001"
    name: "Permission Groups Discovery: Local Groups"
    tactic: discovery
    primitive: permission_group_discovery

  - attack_id: "T1007"
    name: "System Service Discovery"
    tactic: discovery
    primitive: service_discovery

  - attack_id: "T1135"
    name: "Network Share Discovery"
    tactic: discovery
    primitive: network_share_discovery

  # --- Read-only enumeration TTPs ---
  #
  # These reuse the existing `powershell` primitive (rendered by every framework),
  # so they are pure catalog additions — no Go changes, available everywhere. Each
  # runs a benign, native Windows enumeration built-in (net/reg/whoami/nltest/
  # PowerShell cmdlet). They are READ-ONLY: no state is created, so no Reverter
  # cleanup is needed (consistent with the "leave no orphaned artifacts"
  # invariant). The command is operator-overridable via the `command` input.
  # Domain-aware account/group enumeration (the most-requested AD coverage gap).
  - attack_id: "T1087.002"
    name: "Account Discovery: Domain Account"
    tactic: discovery
    primitive: powershell
    args:
      script:
        from: command
        default: net user /domain

  - attack_id: "T1069.002"
    name: "Permission Groups Discovery: Domain Groups"
    tactic: discovery
    primitive: powershell
    args:
      script:
        from: command
        default: net group "Domain Admins" /domain

  - attack_id: "T1482"
    name: "Domain Trust Discovery"
    tactic: discovery
    primitive: powershell
    args:
      script:
        from: command
        default: nltest /domain_trusts

  - attack_id: "T1201"
    name: "Password Policy Discovery"
    tactic: discovery
    primitive: powershell
    args:
      script:
        from: command
        default: net accounts

  - attack_id: "T1033"
    name: "System Owner/User Discovery"
    tactic: discovery
    primitive: powershell
    args:
      script:
        from: command
        default: whoami /all

  - attack_id: "T1124"
    name: "System Time Discovery"
    tactic: discovery
    primitive: powershell
    args:
      script:
        from: command
        default: w32tm /query /status

  - attack_id: "T1012"
    name: "Query Registry"
    tactic: discovery
    primitive: powershell
    args:
      script:
        from: command
        default: reg query "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run"

  - attack_id: "T1518.001"
    name: "Security Software Discovery"
    tactic: discovery
    primitive: powershell
    args:
      script:
        from: command
        default: Get-MpComputerStatus | Select-Object AMRunningMode, AntivirusEnabled, RealTimeProtectionEnabled

  - attack_id: "T1518"
    name: "Software Discovery"
    tactic: discovery
    primitive: powershell
    args:
      script:
        from: command
        default: Get-ItemProperty "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" | Select-Object DisplayName

  - attack_id: "T1614.001"
    name: "System Location Discovery: System Language Discovery"
    tactic: discovery
    primitive: powershell
    args:
      script:
        from: command
        default: Get-WinSystemLocale

  - attack_id: "T1217"
    name: "Browser Information Discovery"
    tactic: collection
    primitive: powershell
    args:
      script:
        from: command
        default: Get-ChildItem -Path "$env:LOCALAPPDATA\Google\Chrome\User Data\Default\Bookmarks" -ErrorAction SilentlyContinue

  - attack_id: "T1087.003"
    name: "Account Discovery: Email Account"
    tactic: discovery
    primitive: powershell
    args:
      script:
        from: command
        default: reg query "HKCU\Software\Microsoft\Office\16.0\Outlook\Profiles" /s
