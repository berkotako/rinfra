  - attack_id: "T1219"
    name: "Remote Access Software"
    tactic: command-and-control
    risk: dangerous
    primitive: registry_run_key
    args:
      # RInfra does not bundle or install any remote-access tool (compose, not
      # author) — `target` must be the path to software the operator has
      # already legitimately deployed/found on the box; establishes real
      # persistent auto-launch for it. No default: unresolved -> a clean
      # Compile error rather than a fabricated attempt against a made-up path.
      registry_key:
        from: registry_key
        default: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Run'
      registry_value:
        from: registry_value
        default: RInfraRemoteAccess
      data:
        from: target
        required: true

