  # --- Read-only enumeration TTPs ---
  #
  # These reuse the existing `powershell` primitive (rendered by every framework),
  # so they are pure catalog additions — no Go changes, available everywhere. Each
  # runs a benign, native Windows enumeration built-in (net/reg/whoami/nltest/
  # PowerShell cmdlet). They are READ-ONLY: no state is created, so no Reverter
  # cleanup is needed (consistent with the "leave no orphaned artifacts"
  # invariant). The command is operator-overridable via the `command` input.
  # Domain-aware account/group enumeration (the most-requested AD coverage gap).
  - attack_id: "T1087.002"
    name: "Account Discovery: Domain Account"
    tactic: discovery
    risk: caution
    primitive: powershell
    args:
      script:
        from: command
        default: net user /domain

  - attack_id: "T1069.002"
    name: "Permission Groups Discovery: Domain Groups"
    tactic: discovery
    risk: caution
    primitive: powershell
    args:
      script:
        # Quote-free: the Metasploit renderer wraps the script as
        # `-a '-c "<script>"'`, so any inner quote breaks the grouping. Enumerate
        # all domain groups (operators can target a specific group via the input).
        from: command
        default: net group /domain

