# Portable technique → primitive catalog.
#
# This is the data-driven "add a TTP" surface. Each entry maps an ATT&CK
# technique to one portable c2.Primitive plus argument bindings; every C2
# framework knows how to render the (small, closed) set of primitives, so a
# technique added here is automatically available on every framework that
# supports its primitive — with NO Go changes. A framework that doesn't support
# the primitive reports the technique unsupported (honest BAS taxonomy).
#
# Schema per entry:
#   attack_id: "T1059.001"        # ATT&CK technique ID (dispatch key; required)
#   name:      "..."              # human-readable (optional, documentation)
#   tactic:    execution          # ATT&CK tactic slug (optional, documentation)
#   risk:      safe               # danger tag (required): safe | caution | dangerous
#   primitive: powershell         # one of the c2.PrimitiveKind values (required)
#   args:                         # optional; resolved into Primitive.Args
#     <arg_name>:
#       from:     <input_key>     # source key in technique.Inputs (optional)
#       default:  <value>         # used when the input is absent/empty (optional)
#       required: true            # error if unresolved (optional, default false)
#
# risk is a senior-red-team-panel assessment of each technique's REALISTIC
# operational risk (detection footprint, credential/data exposure, blast radius,
# OPSEC/authorization sensitivity); the most conservative lens wins. It is
# metadata only — it does NOT gate execution today (every technique here is
# read-only enumeration) — but a scope policy or the UI can warn on caution/
# dangerous before an operator runs a sensitive technique in a live engagement.
#   safe      — routine read-only recon; negligible footprint and scope.
#   caution   — read-only but sensitive: credential/AD/cloud/security-tool
#               surfaces, remote shares, or heavy recursive scans.
#   dangerous — adversary-equivalent (cloud-IAM/metadata or plaintext-secret
#               exposure, domain-wide AD dumps, Kerberoasting) OR backed by a
#               state-changing primitive (registry_run_key, scheduled_task,
#               shortcut_modification, wmi_event_subscription, ifeo_injection,
#               port_monitor, active_setup).
#
# No payload content, shellcode, or exploit material belongs in this file — only
# the portable verb + the parameters the technique supplies.
techniques:
  - attack_id: "T1059.001"
    name: "Command and Scripting Interpreter: PowerShell"
    tactic: execution
    risk: safe
    primitive: powershell
    args:
      script:
        from: command
        default: whoami

  - attack_id: "T1059.003"
    name: "Command and Scripting Interpreter: Windows Command Shell"
    tactic: execution
    risk: safe
    primitive: shell
    args:
      command:
        from: command
        default: whoami

  - attack_id: "T1082"
    name: "System Information Discovery"
    tactic: discovery
    risk: safe
    primitive: sysinfo

  - attack_id: "T1057"
    name: "Process Discovery"
    tactic: discovery
    risk: safe
    primitive: process_list

  - attack_id: "T1049"
    name: "System Network Connections Discovery"
    tactic: discovery
    risk: safe
    primitive: net_connections

  - attack_id: "T1016"
    name: "System Network Configuration Discovery"
    tactic: discovery
    risk: safe
    primitive: net_config

  - attack_id: "T1083"
    name: "File and Directory Discovery"
    tactic: discovery
    risk: caution
    primitive: file_list
    args:
      # No default here: the listing root is framework-specific (e.g. "." on
      # Sliver/Havoc/PoshC2, "C:\" on Metasploit), so each renderer supplies its
      # own fallback when no path input is given.
      path:
        from: path

  - attack_id: "T1005"
    name: "Data from Local System"
    tactic: collection
    risk: caution
    primitive: download
    args:
      path:
        from: path
        required: true

  - attack_id: "T1053.005"
    name: "Scheduled Task/Job: Scheduled Task"
    tactic: persistence
    risk: dangerous
    primitive: scheduled_task
    args:
      task_name:
        from: task_name
        default: RInfraTest

  - attack_id: "T1547.001"
    name: "Boot or Logon Autostart Execution: Registry Run Keys"
