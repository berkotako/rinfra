    tactic: defense-evasion
    risk: safe
    primitive: powershell
    args:
      script:
        # Quote-free (Windows*NT wildcard, matches T1547.004): checks the actual
        # artifact this technique creates — a SpecialAccounts\UserList entry
        # that hides the account from the logon screen — not a generic user
        # listing (that's T1087.001's job).
        from: command
        default: 'Get-ItemProperty HKLM:\SOFTWARE\Microsoft\Windows*\CurrentVersion\Winlogon\SpecialAccounts\UserList -ErrorAction SilentlyContinue'

  - attack_id: "T1564.003"
    name: "Hide Artifacts: Hidden Window"
    tactic: defense-evasion
    risk: safe
    primitive: powershell
    args:
      script:
        # Targets the actual IOC — a -WindowStyle Hidden / -w hidden flag in the
        # command line — instead of MainWindowHandle -eq 0, which also flags
        # every ordinary console-less background process.
        from: command
        default: 'Get-CimInstance Win32_Process | Where-Object CommandLine -match hidden | Select-Object Name,ProcessId,CommandLine'

