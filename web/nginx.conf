server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # The Next.js export uses trailingSlash, so each route is a directory with
    # an index.html. Fall back to the matching .html, then to the 404 page.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Cache hashed static assets aggressively.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
